# =============================================================================
# Claw-Empire — Docker Compose
# =============================================================================
# Services:
#   claw-empire  — Main app (frontend + API)
#   qdrant       — Vector database for semantic search
#   ollama       — Local embedding model (nomic-embed-text)
# =============================================================================
#
# Quick start:
#   cp .env.example .env    # Edit secrets
#   docker compose up -d
#   docker compose exec ollama ollama pull nomic-embed-text
#
# Access: http://localhost:8790
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Claw-Empire App
  # ---------------------------------------------------------------------------
  claw-empire:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-empire
    restart: unless-stopped
    ports:
      - "${PORT:-8790}:8790"
    volumes:
      - claw-data:/data
      - claw-worktrees:/app/.climpire-worktrees
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8790
      - DB_PATH=/data/db/claw-empire.sqlite
      - LOGS_DIR=/data/logs
      # Vector search — connects to sibling containers
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_ENABLED=true
      - EMBEDDING_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8790/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: claw-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Ollama — Local Embedding Model
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  claw-data:
    name: claw-empire-data
  claw-worktrees:
    name: claw-empire-worktrees
  qdrant-data:
    name: claw-qdrant-data
  ollama-data:
    name: claw-ollama-data
